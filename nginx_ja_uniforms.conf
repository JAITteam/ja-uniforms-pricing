# J.A. Uniforms - Nginx Configuration
# Place this file in: /etc/nginx/sites-available/ja_uniforms
# Then symlink: sudo ln -s /etc/nginx/sites-available/ja_uniforms /etc/nginx/sites-enabled/

# Redirect HTTP to HTTPS (uncomment after SSL setup)
# server {
#     listen 80;
#     server_name ja-uniforms.local;  # or your server's IP
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name ja-uniforms.local;  # Change to your server's hostname or IP

    # SSL Configuration (uncomment after generating certificates)
    # ssl_certificate /etc/ssl/certs/ja_uniforms.crt;
    # ssl_certificate_key /etc/ssl/private/ja_uniforms.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Logging
    access_log /var/log/nginx/ja_uniforms_access.log;
    error_log /var/log/nginx/ja_uniforms_error.log;

    # Max upload size
    client_max_body_size 16M;

    # Root directory (for static files)
    root /workspace;

    # Static files (served directly by Nginx for better performance)
    location /static/ {
        alias /workspace/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(\.env|\.git|__pycache__|*.pyc) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
